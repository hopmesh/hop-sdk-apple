# Publish the Swift package only after validating its exact canonical xcframework release asset.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  prepare:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.provenance.outputs.source_sha }}
      native_artifact_name: ${{ steps.native-artifact.outputs.name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Mint canonical-source read token
        id: source-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HOP_SOURCE_APP_ID }}
          private-key: ${{ secrets.HOP_SOURCE_APP_PRIVATE_KEY }}
          owner: hopmesh
          repositories: monorepo
          permission-actions: read
          permission-attestations: read
          permission-checks: read
          permission-contents: read
      - name: Verify canonical source, tag, tree, CI, and native provenance
        id: provenance
        env:
          SOURCE_TOKEN: ${{ steps.source-token.outputs.token }}
        run: >-
          python3 .github/release-provenance.py
          --component hop-sdk-apple
          --require-native-artifacts
          --github-output "$GITHUB_OUTPUT"
      - name: Download canonical native bundle by run and artifact ID
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        run: >-
          python3 native/native-artifacts.py download-github
          --run-id '${{ steps.provenance.outputs.native_run_id }}'
          --run-attempt '${{ steps.provenance.outputs.native_run_attempt }}'
          --source-sha '${{ steps.provenance.outputs.source_sha }}'
          --output "$RUNNER_TEMP/native-release"
      - name: Verify signed bundle and canonical attestations
        env:
          GH_TOKEN: ${{ steps.source-token.outputs.token }}
        run: |
          python3 native/native-artifacts.py verify-provenance \
            --manifest "$RUNNER_TEMP/native-release/native-artifacts.json" \
            --signature "$RUNNER_TEMP/native-release/native-artifacts.json.sig" \
            --public-key native/native-artifacts-public.pem \
            --directory "$RUNNER_TEMP/native-release" \
            --provenance-bundle "$RUNNER_TEMP/native-release/native-artifacts.provenance.sigstore.json" \
            --source-sha '${{ steps.provenance.outputs.source_sha }}' \
            --tag "$GITHUB_REF_NAME" --run-id '${{ steps.provenance.outputs.native_run_id }}' \
            --run-attempt '${{ steps.provenance.outputs.native_run_attempt }}'
      - name: Bind native input artifact identity
        id: native-artifact
        run: echo "name=native-input-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.native-artifact.outputs.name }}
          path: ${{ runner.temp }}/native-release/*
          if-no-files-found: error
          retention-days: 1

  build:
    needs: prepare
    runs-on: macos-14
    permissions:
      contents: read
    outputs:
      release_artifact_name: ${{ steps.release-artifact.outputs.name }}
      release_artifact_attempt: ${{ steps.release-artifact.outputs.run_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.native_artifact_name }}
          path: ${{ runner.temp }}/native-release
      - name: Verify package checksum, slices, tests, and clean consumer
        run: |
          set -euo pipefail
          swift package dump-package > "$RUNNER_TEMP/package.json"
          expected="$(python3 -c 'import json; p=json.load(open("'"$RUNNER_TEMP/package.json"'")); print(next(t["checksum"] for t in p["targets"] if t["name"] == "CHop"))')"
          actual="$(swift package compute-checksum "$RUNNER_TEMP/native-release/libhop.xcframework.zip")"
          test "$expected" = "$actual"
          mkdir Frameworks
          ditto -x -k "$RUNNER_TEMP/native-release/libhop.xcframework.zip" Frameworks
          python3 native/native-artifacts.py apple-verify \
            --xcframework Frameworks/libhop.xcframework \
            --manifest Frameworks/libhop.xcframework/architecture-manifest.json
          cp Package.swift "$RUNNER_TEMP/Package.published.swift"
          cp Package.local.swift Package.swift
          swift test
          cmp Package.local.swift Package.swift
          cp "$RUNNER_TEMP/Package.published.swift" Package.swift
          consumer="$RUNNER_TEMP/apple-consumer"
          mkdir -p "$consumer/Sources/CleanConsumer"
          cat > "$consumer/Package.swift" <<EOF
          // swift-tools-version:5.9
          import PackageDescription
          let package = Package(
            name: "CleanConsumer",
            platforms: [.macOS(.v13)],
            dependencies: [.package(path: "$GITHUB_WORKSPACE")],
            targets: [.executableTarget(name: "CleanConsumer", dependencies: [.product(name: "Hop", package: "hop-sdk-apple")])]
          )
          EOF
          printf 'import Hop\nprint("Hop consumer compiled")\n' > "$consumer/Sources/CleanConsumer/main.swift"
          cp Package.local.swift Package.swift
          swift package --package-path "$consumer" resolve
          swift build --package-path "$consumer"
          cp "$RUNNER_TEMP/Package.published.swift" Package.swift
          release="$RUNNER_TEMP/release"
          mkdir "$release"
          cp "$RUNNER_TEMP/native-release/libhop.xcframework.zip" "$release/"
          cp "$RUNNER_TEMP/native-release/native-artifacts.json" "$release/"
          cp "$RUNNER_TEMP/native-release/native-artifacts.json.sig" "$release/"
          cp "$RUNNER_TEMP/native-release/native-artifacts.provenance.sigstore.json" "$release/"
          python3 .github/release-artifact.py create --directory "$release" \
            --canonical-source-sha '${{ needs.prepare.outputs.source_sha }}'
      - name: Bind release artifact identity
        id: release-artifact
        run: |
          echo "name=release-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.release-artifact.outputs.name }}
          path: ${{ runner.temp }}/release/*
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.release_artifact_name }}
          path: ${{ runner.temp }}/release
      - name: Verify immutable Swift release assets
        run: >-
          python3 .github/release-artifact.py verify --directory "$RUNNER_TEMP/release"
          --canonical-source-sha '${{ needs.prepare.outputs.source_sha }}'
          --run-attempt '${{ needs.build.outputs.release_artifact_attempt }}'
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: ${{ runner.temp }}/release/*
